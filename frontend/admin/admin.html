<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Noir Perfume House Admin</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>

<div class="dashboard">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>🖤 Noir Admin</h2>
    <button onclick="showSection('add')">➕ Add Product</button>
    <button onclick="showSection('list')">📦 Products</button>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main">

    <!-- ADD PRODUCT -->
    <div id="addSection" class="section">
      <h1>Add Product</h1>

      <input type="text" id="name" placeholder="Name" />
      <input type="text" id="description" placeholder="Description" />
      <input type="number" id="price" placeholder="Price" />
      <input type="text" id="image" placeholder="Image URL" />

      <button onclick="addProduct()">Add Product</button>
    </div>

    <!-- PRODUCT LIST -->
    <div id="listSection" class="section hidden">
      <h1>Products</h1>
      <div id="productList"></div>
    </div>

  </div>

</div>

<script src="admin.js"></script>
</body>
</html>
